name: 🚀 Deploy Azure via CLI

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: 🔐 Login no Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: ⚙️ Setar Subscription
      run: |
        echo "SUBSCRIPTION_ID=$(az account show --query id -o tsv)" >> $GITHUB_ENV

    - name: 🚀 Executar Script Bash
      run: |
        chmod +x cms_virtualizacao_virtual_machine_extra_discs.sh
        ./cms_virtualizacao_virtual_machine_extra_discs.sh
