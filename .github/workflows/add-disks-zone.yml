name: 💽 Add Data Disks to VM

on:
  workflow_dispatch:
    inputs:

      subscription_id:
        description: "ID da Subscription"
        required: true

      resource_group:
        description: "Resource Group da VM"
        required: true

      vm_name:
        description: "Nome da VM"
        required: true

      location:
        description: "Região da VM"
        required: true
        default: "brazilsouth"

      num_disks:
        description: "Quantidade de discos (1 a 4)"
        required: true
        default: "1"

      data_disk_size:
        description: "Tamanho do disco (GB)"
        required: true
        default: "128"

      data_disk_sku:
        description: "Tipo do disco (Standard_LRS, Premium_LRS, StandardSSD_LRS)"
        required: true
        default: "Premium_LRS"

      data_disk_cache:
        description: "Cache (None, ReadOnly, ReadWrite)"
        required: true
        default: "None"

      disk_zone:
        description: "Zona do disco (1,2,3 ou none para sem zona)"
        required: true
        default: "none"

jobs:
  add-disks:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔐 Login Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: 🚀 Executar Script
      env:
        SUBSCRIPTION_ID: ${{ github.event.inputs.subscription_id }}
        RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
        VM_NAME: ${{ github.event.inputs.vm_name }}
        LOCATION: ${{ github.event.inputs.location }}
        NUM_DISKS: ${{ github.event.inputs.num_disks }}
        DATA_DISK_SIZE: ${{ github.event.inputs.data_disk_size }}
        DATA_DISK_SKU: ${{ github.event.inputs.data_disk_sku }}
        DATA_DISK_CACHE: ${{ github.event.inputs.data_disk_cache }}
        DISK_ZONE: ${{ github.event.inputs.disk_zone }}

      run: |
        chmod +x add-data-disks-zone.sh
        ./add-data-disks-zone.sh
